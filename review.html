<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | Lineside Electrical Limited</title>
<meta name="description" content="Tell us how we did. Rate your experience with Lineside Electrical, Christchurch.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23ff8a00'/%3E%3Cpath d='M18 4 L8 18 h6 l-2 10 12-16 h-7 z' fill='%2315171b'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .rate-wrap{max-width:620px;margin:0 auto;padding:70px 24px 90px;text-align:center}
  .rate-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:46px 34px;box-shadow:0 30px 60px -40px rgba(21,23,27,.5)}
  .stars-pick{display:flex;justify-content:center;gap:10px;margin:30px 0 8px}
  .stars-pick button{background:none;border:0;cursor:pointer;font-size:46px;line-height:1;color:#dcd6c8;transition:transform .15s,color .15s}
  .stars-pick button:hover,.stars-pick button.lit{color:var(--accent);transform:scale(1.12)}
  .rate-hint{color:var(--muted);font-size:15px;min-height:22px}
  .rate-card h1{font-size:clamp(32px,6vw,48px);margin-bottom:10px}
  .rate-card p.sub{color:var(--muted);margin-bottom:6px}
  .back{display:inline-block;margin-top:26px;color:var(--muted);font-size:14px}
  .back:hover{color:var(--accent)}
</style>
</head>
<body>
<nav class="nav nav--scrolled">
  <a class="brand" href="index.html">
    <span class="mark"><svg viewBox="0 0 32 32" fill="none"><path d="M18 4 L8 18 h6 l-2 10 12-16 h-7 z" fill="#15171b"/></svg></span>
    <span><b>Lineside</b><span>Electrical Ltd</span></span>
  </a>
  <div class="nav-cta"><a class="nav-phone" href="tel:+6421415646">021 415 646</a><a class="btn btn--amber" href="index.html">Back to Site</a></div>
</nav>

<div class="subhead" style="padding-bottom:30px"><div class="wrap"><span class="eyebrow" style="justify-content:center">Lineside Electrical</span></div></div>

<div class="rate-wrap">
  <div class="rate-card">
    <h1>How did we do?</h1>
    <p class="sub">Tap a star to rate your experience with Lineside Electrical.</p>
    <div class="stars-pick" id="stars">
      <button data-v="1" aria-label="1 star">★</button>
      <button data-v="2" aria-label="2 stars">★</button>
      <button data-v="3" aria-label="3 stars">★</button>
      <button data-v="4" aria-label="4 stars">★</button>
      <button data-v="5" aria-label="5 stars">★</button>
    </div>
    <p class="rate-hint" id="hint">Your feedback helps us keep doing good work.</p>
    <a class="back" href="index.html">← Back to home</a>
  </div>
</div>

<script>
  // 4-5 stars -> Google review; 1-3 stars -> private feedback form
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER/review";
  var stars = document.querySelectorAll("#stars button");
  var hint = document.getElementById("hint");
  var hints = {1:"Sorry to hear that — tell us what went wrong.",2:"We'd like to put this right.",3:"Thanks — how could we have done better?",4:"Great! Taking you to Google…",5:"Awesome — taking you to Google…"};
  stars.forEach(function(btn){
    btn.addEventListener("mouseenter",function(){paint(+btn.dataset.v)});
    btn.addEventListener("focus",function(){paint(+btn.dataset.v)});
    btn.addEventListener("click",function(){
      var v=+btn.dataset.v; hint.textContent=hints[v];
      setTimeout(function(){
        if(v>=4){ window.location.href=GOOGLE_REVIEW_URL; }
        else{ window.location.href="private.html?rating="+v; }
      },550);
    });
  });
  document.getElementById("stars").addEventListener("mouseleave",function(){paint(0)});
  function paint(n){stars.forEach(function(b){b.classList.toggle("lit",+b.dataset.v<=n)})}
</script>
</body>
</html>
