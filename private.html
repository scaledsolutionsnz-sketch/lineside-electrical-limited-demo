<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Private Feedback | Lineside Electrical Limited</title>
<meta name="description" content="Send private feedback to Lineside Electrical, Christchurch.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<section class="choice-wrap">
  <div class="wrap" style="max-width:600px">
    <a class="brand" href="index.html" style="justify-content:center;margin-bottom:8px">
      <span class="spark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4.5 13.5H11l-1 8.5 8.5-12H12l1-8z"/></svg></span>
      <span>Lineside Electrical<small>Christchurch</small></span>
    </a>
    <h1>Tell us what went wrong</h1>
    <p>No call centre, no script — this goes straight to Joe. We read every message and we'll get back to you to make it right.</p>
    <form class="form" action="https://formsubmit.co/joe@linesideelectrical.co.nz" method="POST" style="text-align:left">
      <input type="hidden" name="_subject" value="Private feedback — Lineside Electrical website">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">
      <div class="field"><label for="name">Name</label><input id="name" name="name" required placeholder="Your name"></div>
      <div class="field"><label for="contact">Phone or email</label><input id="contact" name="contact" required placeholder="How we reach you"></div>
      <div class="field"><label for="msg">What happened?</label><textarea id="msg" name="message" required placeholder="Tell us about the job and what we could have done better"></textarea></div>
      <button type="submit" class="btn btn-primary">Send to Joe</button>
      <p class="fineprint">Prefer to talk? Call 021 415 646.</p>
    </form>
    <p style="margin-top:2rem;font-size:.92rem"><a href="index.html" style="color:var(--copper)">← Back to the website</a></p>
  </div>
</section>
<script src="script.js"></script>
</body>
</html>
